<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="inner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </linearGradient>
  </defs>
  <circle cx="128" cy="128" r="120" fill="url(#inner)" stroke="url(#ring)" stroke-width="4">
    <animate attributeName="stroke-width" values="4;6;4" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="128" cy="128" r="110" fill="none" stroke="url(#ring)" stroke-width="1" opacity="0.4">
    <animate attributeName="r" values="110;114;110" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.2;0.4" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="128" y="140" font-family="Arial,Helvetica,sans-serif" font-size="64" font-weight="900" fill="url(#ring)" text-anchor="middle" dominant-baseline="middle">K</text>
</svg>
